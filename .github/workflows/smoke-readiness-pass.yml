# Smoke workflow: PASS path for the reusable readiness.yml.
#
# Manual-only (workflow_dispatch). Verifies the reusable workflow accepts
# PASS-shaped inputs and finishes green. Synthetic evidence is written
# inline so this smoke does not depend on real CI evidence files.
#
# Usage:
#   gh workflow run smoke-readiness-pass.yml --ref <branch>
#
# Expected: green workflow run; gate-status output is PASS.

name: smoke-readiness-pass

on:
  workflow_dispatch:
    inputs:
      package-ref:
        description: git ref to install release-readiness-core from (default main)
        required: false
        default: main

jobs:
  prep-evidence:
    runs-on: ubuntu-latest
    outputs:
      base-sha: ${{ steps.write.outputs.base-sha }}
    steps:
      - uses: actions/checkout@v5
      - name: Write synthetic PASS evidence
        id: write
        shell: bash
        run: |
          mkdir -p evidence
          echo '{"status":"passed","passed":true,"smoke_passing":true}' > evidence/smoke.json
          echo '{"status":"passed","failed_count":0,"total_count":0,"retries":0,"failures":[],"validations":{}}' > evidence/e2e.json
          echo '{"line_percent":92.0,"baseline_percent":85.0}' > evidence/coverage.json
          echo "base-sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Upload evidence
        uses: actions/upload-artifact@v4
        with:
          name: smoke-pass-evidence
          path: evidence/

  readiness:
    needs: prep-evidence
    uses: ./.github/workflows/readiness.yml
    with:
      package-ref: ${{ inputs.package-ref }}
      smoke-results: evidence/smoke.json
      e2e-results: evidence/e2e.json
      coverage: evidence/coverage.json
      enforcement-mode: block_only
      comment-on-pr: false
      publish-check: false
      combine-with-pr-risk: false
    secrets: inherit

  verify:
    needs: readiness
    runs-on: ubuntu-latest
    steps:
      - name: Assert gate-status is PASS
        shell: bash
        run: |
          STATUS="${{ needs.readiness.outputs['gate-status'] }}"
          echo "Observed gate-status: $STATUS"
          if [ "$STATUS" != "PASS" ]; then
            echo "::error::expected PASS, got $STATUS"
            exit 1
          fi
