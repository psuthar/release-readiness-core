# Smoke workflow: PASS path for the reusable readiness.yml.
#
# Manual-only (workflow_dispatch). Verifies the reusable workflow accepts
# PASS-shaped inputs and finishes green. Synthetic evidence is committed
# under tests/fixtures/smoke-pass/ so the reusable workflow's own
# actions/checkout step picks it up without an inter-job artifact dance.
#
# Usage:
#   gh workflow run smoke-readiness-pass.yml --ref <branch>
#
# Expected: green workflow run; gate-status output is PASS.

name: smoke-readiness-pass

on:
  workflow_dispatch:
    inputs:
      package-ref:
        description: git ref to install release-readiness-core from (default main)
        required: false
        default: main

# The reusable readiness.yml requests checks: write + pull-requests: write
# (for Check publishing + sticky comment). Caller must grant these or GitHub
# rejects the workflow_call at startup.
permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  readiness:
    uses: ./.github/workflows/readiness.yml
    with:
      package-ref: ${{ inputs.package-ref }}
      smoke-results: tests/fixtures/smoke-pass/smoke.json
      e2e-results: tests/fixtures/smoke-pass/e2e.json
      coverage: tests/fixtures/smoke-pass/coverage.json
      enforcement-mode: block_only
      comment-on-pr: false
      publish-check: false
      combine-with-pr-risk: false
    secrets: inherit

  verify:
    needs: readiness
    runs-on: ubuntu-latest
    steps:
      - name: Assert gate-status is PASS
        shell: bash
        run: |
          STATUS="${{ needs.readiness.outputs['gate-status'] }}"
          echo "Observed gate-status: $STATUS"
          if [ "$STATUS" != "PASS" ]; then
            echo "::error::expected PASS, got '$STATUS'"
            exit 1
          fi
          echo "PASS correctly detected — smoke validation green"
