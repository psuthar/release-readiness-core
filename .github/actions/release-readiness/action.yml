name: release-readiness
description: >-
  Install release-readiness-core, run the deterministic evaluator against
  pre-collected evidence, and append the report to the GitHub job summary.
  Adopters keep responsibility for collecting smoke / E2E / coverage
  artifacts; this action handles install + invoke + publish.

inputs:
  package-ref:
    description: >-
      git ref (SHA or tag) to install from this repo.
      Pin to a SHA in production.
    required: true
  config-path:
    description: Path to the project's release-readiness config.yaml.
    required: false
    default: ops/release-readiness/config.yaml
  smoke-results:
    description: Path to evidence/smoke.json (relative to --repo-root).
    required: false
    default: ""
  e2e-results:
    description: Path to evidence/e2e.json (relative to --repo-root).
    required: false
    default: ""
  coverage:
    description: Path to evidence/coverage.json (relative to --repo-root).
    required: false
    default: ""
  prod-health:
    description: Path to evidence/prod_health.json (relative to --repo-root).
    required: false
    default: ""
  base-ref:
    description: Git base ref for the diff (defaults to origin/<base>).
    required: false
    default: ""
  enforcement-mode:
    description: block_only | warn_and_block. Step exits non-zero on BLOCK (or WARN if warn_and_block).
    required: false
    default: block_only
  output-dir:
    description: Output directory for report.json/report.md (relative to --repo-root).
    required: false
    default: artifacts/release-readiness

runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v6

    - name: Set up Python
      shell: bash
      run: uv python install

    - name: Install release-readiness-core
      shell: bash
      run: |
        uv pip install --system \
          "git+https://github.com/psuthar/release-readiness-core.git@${{ inputs.package-ref }}"

    - name: Run release-readiness-evaluate
      shell: bash
      env:
        SMOKE: ${{ inputs.smoke-results }}
        E2E: ${{ inputs.e2e-results }}
        COVERAGE: ${{ inputs.coverage }}
        PROD: ${{ inputs.prod-health }}
        BASE: ${{ inputs.base-ref }}
      run: |
        ARGS=(--repo-root . --config "${{ inputs.config-path }}" \
              --enforcement-mode "${{ inputs.enforcement-mode }}" \
              --output-dir "${{ inputs.output-dir }}")
        [ -n "$SMOKE" ]    && ARGS+=(--smoke-results "$SMOKE")
        [ -n "$E2E" ]      && ARGS+=(--e2e-results "$E2E")
        [ -n "$COVERAGE" ] && ARGS+=(--coverage "$COVERAGE")
        [ -n "$PROD" ]     && ARGS+=(--prod-health "$PROD")
        [ -n "$BASE" ]     && ARGS+=(--base-ref "$BASE")
        release-readiness-evaluate "${ARGS[@]}"

    - name: Append report to job summary
      if: always()
      shell: bash
      run: |
        if [ -f "${{ inputs.output-dir }}/report.md" ]; then
          cat "${{ inputs.output-dir }}/report.md" >> "$GITHUB_STEP_SUMMARY"
        fi
