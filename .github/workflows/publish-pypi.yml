# Upload sdist + wheel to PyPI using Trusted Publishing (OIDC).
#
# One-time PyPI setup (maintainer): create the project on PyPI and add a
# trusted publisher for this repository — see RELEASE.md § PyPI trusted publishing.
#
# Triggers:
#   - push of an annotated tag matching v*.*.* (e.g. v0.3.3)
#   - workflow_dispatch (run workflow against a chosen tag in the UI)

name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/release-readiness-core/
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
