name: release-readiness
description: >-
  Install release-readiness-core, run the deterministic evaluator against
  pre-collected evidence, and append the report to the GitHub job summary.
  Adopters keep responsibility for collecting smoke / E2E / coverage
  artifacts; this action handles install + invoke + publish.

inputs:
  install-source:
    description: >-
      git — pip install from github.com/psuthar/release-readiness-core at package-ref.
      pypi — pip install release-readiness-core==pypi-version (no git access to source).
    required: false
    default: "git"
  pypi-version:
    description: >-
      Version to install from PyPI when install-source is pypi (e.g. 0.3.3).
      Ignored when install-source is git.
    required: false
    default: ""
  package-ref:
    description: >-
      When install-source is git: git ref (SHA or tag) for the pip install URL.
      Pin to a SHA in production. When using actions from this repo, this is
      typically the same ref as the @ref on uses: for this composite.
    required: false
    default: ""
  config-path:
    description: Path to the project's release-readiness config.yaml.
    required: false
    default: ops/release-readiness/config.yaml
  smoke-results:
    description: Path to evidence/smoke.json (relative to --repo-root).
    required: false
    default: ""
  e2e-results:
    description: Path to evidence/e2e.json (relative to --repo-root).
    required: false
    default: ""
  coverage:
    description: Path to evidence/coverage.json (relative to --repo-root).
    required: false
    default: ""
  prod-health:
    description: Path to evidence/prod_health.json (relative to --repo-root).
    required: false
    default: ""
  base-ref:
    description: Git base ref for the diff (defaults to origin/<base>).
    required: false
    default: ""
  enforcement-mode:
    description: block_only | warn_and_block. Step exits non-zero on BLOCK (or WARN if warn_and_block).
    required: false
    default: block_only
  output-dir:
    description: Output directory for report.json/report.md (relative to --repo-root).
    required: false
    default: artifacts/release-readiness
  run-doctor:
    description: >-
      When 'true', run release-readiness-doctor against the same config +
      evidence inputs before invoking release-readiness-evaluate. Doctor
      catches typos, evidence-shape mismatches, and common inconsistencies
      (e.g. failed_count > 0 with failures: []) before they reach the
      evaluator. Doctor failure surfaces as a ::error annotation and the
      step exits non-zero. Defaults to 'false' to preserve today's behavior.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Set up uv
      uses: astral-sh/setup-uv@v6

    - name: Install release-readiness-core
      shell: bash
      env:
        INSTALL_SOURCE: ${{ inputs.install-source }}
        PACKAGE_REF: ${{ inputs.package-ref }}
        PYPI_VERSION: ${{ inputs.pypi-version }}
      run: |
        set -euo pipefail
        if [ "$INSTALL_SOURCE" = "pypi" ]; then
          if [ -z "${PYPI_VERSION}" ]; then
            echo "::error file=.github/actions/release-readiness/action.yml::install-source=pypi requires a non-empty pypi-version input"
            exit 1
          fi
          uv pip install --system "release-readiness-core==${PYPI_VERSION}"
        else
          if [ -z "${PACKAGE_REF}" ]; then
            echo "::error file=.github/actions/release-readiness/action.yml::install-source=git requires a non-empty package-ref input"
            exit 1
          fi
          uv pip install --system \
            "git+https://github.com/psuthar/release-readiness-core.git@${PACKAGE_REF}"
        fi

    - name: Run release-readiness-doctor (pre-flight)
      if: inputs.run-doctor == 'true'
      shell: bash
      env:
        SMOKE: ${{ inputs.smoke-results }}
        E2E: ${{ inputs.e2e-results }}
        COVERAGE: ${{ inputs.coverage }}
        PROD: ${{ inputs.prod-health }}
      run: |
        ARGS=(--config "${{ inputs.config-path }}")
        [ -n "$SMOKE" ]    && ARGS+=(--smoke-results "$SMOKE")
        [ -n "$E2E" ]      && ARGS+=(--e2e-results "$E2E")
        [ -n "$COVERAGE" ] && ARGS+=(--coverage "$COVERAGE")
        [ -n "$PROD" ]     && ARGS+=(--prod-health "$PROD")
        if ! release-readiness-doctor "${ARGS[@]}"; then
          echo "::error file=${{ inputs.config-path }}::release-readiness-doctor reported errors — fix before evaluate"
          exit 1
        fi

    - name: Run release-readiness-evaluate
      shell: bash
      env:
        SMOKE: ${{ inputs.smoke-results }}
        E2E: ${{ inputs.e2e-results }}
        COVERAGE: ${{ inputs.coverage }}
        PROD: ${{ inputs.prod-health }}
        BASE: ${{ inputs.base-ref }}
      run: |
        ARGS=(--repo-root . --config "${{ inputs.config-path }}" \
              --enforcement-mode "${{ inputs.enforcement-mode }}" \
              --output-dir "${{ inputs.output-dir }}")
        [ -n "$SMOKE" ]    && ARGS+=(--smoke-results "$SMOKE")
        [ -n "$E2E" ]      && ARGS+=(--e2e-results "$E2E")
        [ -n "$COVERAGE" ] && ARGS+=(--coverage "$COVERAGE")
        [ -n "$PROD" ]     && ARGS+=(--prod-health "$PROD")
        [ -n "$BASE" ]     && ARGS+=(--base-ref "$BASE")
        release-readiness-evaluate "${ARGS[@]}"

    - name: Append report to job summary
      if: always()
      shell: bash
      run: |
        if [ -f "${{ inputs.output-dir }}/report.md" ]; then
          cat "${{ inputs.output-dir }}/report.md" >> "$GITHUB_STEP_SUMMARY"
        fi
