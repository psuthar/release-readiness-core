# Example workflow: Node + Playwright E2E.
#
# Calls the Tier-1 reusable workflow with a Playwright-derived e2e shape.
# Replace <sha> with a pinned release-readiness-core SHA before adopting.

name: release-readiness

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  collect-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install Node deps
        run: npm ci

      - name: Run Playwright with JSON reporter
        run: npx playwright test --reporter=json > playwright-results.json

      - uses: astral-sh/setup-uv@v6

      - name: Convert Playwright -> readiness e2e shape
        run: |
          mkdir -p evidence
          uvx --from "release-readiness-core==0.3.4" playwright-to-readiness \
            --input playwright-results.json \
            --output evidence/e2e.json \
            --validation-map ops/release-readiness/validation_map.yaml

      - uses: actions/upload-artifact@v4
        with:
          name: readiness-evidence
          path: evidence/

  readiness:
    needs: collect-evidence
    uses: psuthar/release-readiness-core/.github/workflows/readiness.yml@<sha>
    with:
      package-ref: <sha>
      e2e-results: evidence/e2e.json
      enforcement-mode: block_only
      combine-with-pr-risk: false
    secrets: inherit
